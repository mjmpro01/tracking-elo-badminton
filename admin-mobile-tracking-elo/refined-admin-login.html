<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b6cee",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-[440px] flex flex-col items-center gap-10 py-12">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center gap-4 text-center">
<div class="w-20 h-20 rounded-2xl bg-primary/10 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl">admin_panel_settings</span>
</div>
<div>
<h1 class="text-slate-900 dark:text-slate-100 font-bold tracking-tight text-3xl">Admin Portal</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Manage tournaments and ratings securely</p>
</div>
</div>
<!-- Login Form -->
<div class="w-full bg-white dark:bg-[#1a2234] rounded-[28px] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-200/60 dark:border-slate-800 p-8 flex flex-col gap-6">
<!-- Email Input -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium">Email or Username</span>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full pl-10 pr-4 py-3.5 bg-slate-50/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-base" placeholder="admin@tournament.com" type="text"/>
</div>
</label>
<!-- Password Input -->
<label class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium">Password</span>
<a class="text-primary text-sm font-medium hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-4 py-3.5 bg-slate-50/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-base" placeholder="Enter your password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/95 text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.99] flex items-center justify-center gap-3 mt-4 text-lg">
<span>Login as Admin</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</div>
<!-- Help / Contact -->
<div class="flex flex-col items-center gap-4 mt-4">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Having trouble accessing your account?
            </p>
<a class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">support_agent</span>
                Contact Super Admin
            </a>
</div>
<!-- Footer / Version -->
<div class="mt-8 text-center">

<p class="text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-600 font-bold opacity-70">Tournament Manager Admin v2.4.0</p>
</div>
</div>
<!-- Decorative background elements -->
<div class="fixed top-0 left-0 w-full h-64 bg-gradient-to-b from-primary/5 to-transparent -z-10 pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10 translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
</body></html>
