<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Create Player Profile</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 px-4 py-4">
<div class="flex items-center justify-between max-w-2xl mx-auto w-full">
<button class="text-slate-900 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="text-lg font-bold flex-1 text-center">Create Player Profile</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-2xl mx-auto p-4 pb-32">
<!-- Profile Photo Upload -->
<section class="flex flex-col items-center py-6 mb-6">
<div class="relative group">
<div class="size-32 rounded-full bg-slate-200 dark:bg-slate-800 border-4 border-white dark:border-slate-700 overflow-hidden bg-cover bg-center" data-alt="User profile placeholder with male avatar portrait" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC56Wvj4Ju-H2bQL6uTx2N6xYWmUrbNgX3bJ7AE1N-9ti26Rax-ZJ060UQeBDRImc2BA3rZpHSifpW0g6AkxUQTTT0ZzIiruIJM7e4ktqjDAsgRwiF3fH90DR8TZ_bf5bNWqHQZ3_VXDRUTU9Jn5DwwgkrN0qGnbUcJUmGUVSAmFEdagktSatzxc3CUWray6Ipod5KXz80-qECrnOBBctz8kmhSexwrjOJSOVjCfBoXlUsBroZK7QzoC6woVlLbxEHqjLxduI2GFgw')">
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white dark:border-slate-800 hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-sm block">photo_camera</span>
</button>
</div>
<div class="mt-4 text-center">
<h2 class="text-xl font-bold">Upload Photo</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">PNG or JPG up to 5MB</p>
</div>
</section>
<!-- Form Sections -->
<form class="space-y-8">
<!-- Personal Information -->
<fieldset class="space-y-4">
<legend class="text-lg font-bold text-slate-900 dark:text-slate-100 mb-2">Personal Information</legend>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Full Name</label>
<input class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 p-3 outline-none transition-all" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Nickname</label>
<input class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 p-3 outline-none transition-all" placeholder="The Champ" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Initial ELO</label>
<input class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 p-3 outline-none transition-all" placeholder="1200" type="number"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Level / Category</label>
<select class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 p-3 outline-none transition-all">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
<option>Professional</option>
</select>
</div>
</div>
</fieldset>
<!-- Contact Details -->
<fieldset class="space-y-4">
<legend class="text-lg font-bold text-slate-900 dark:text-slate-100 mb-2">Contact Details</legend>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</label>
<input class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 p-3 outline-none transition-all" placeholder="john@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Phone Number</label>
<input class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 p-3 outline-none transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
</fieldset>
<!-- Status Toggle -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl">
<div>
<p class="font-bold text-slate-900 dark:text-slate-100">Active Status</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Available for tournament invitations</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]" type="submit">
                    Create Player Profile
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 safe-area-inset-bottom">
<div class="flex max-w-2xl mx-auto px-2 py-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-xs font-medium">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">emoji_events</span>
<span class="text-xs font-medium">Tournaments</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-primary" href="#">
<span class="material-symbols-outlined fill-1" style="font-variation-settings: 'FILL' 1">group</span>
<span class="text-xs font-bold">Players</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-xs font-medium">Settings</span>
</a>
</div>
</nav>
</body></html>
