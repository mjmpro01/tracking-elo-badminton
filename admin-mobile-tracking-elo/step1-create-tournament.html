<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Tournament - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-start text-slate-900 dark:text-slate-100 antialiased">
<div class="w-full max-w-md bg-white dark:bg-slate-900 shadow-sm min-h-screen relative flex flex-col">
<!-- Header -->
<header class="flex items-center px-4 py-3 bg-white dark:bg-slate-900 sticky top-0 z-10 border-b border-slate-100 dark:border-slate-800">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold text-slate-900 dark:text-slate-100">Create Tournament</h1>
<button class="p-2 -mr-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Stepper -->
<div class="flex items-center justify-center gap-2 py-6 bg-white dark:bg-slate-900">
<div class="w-full px-6 flex gap-2">
<div class="h-1 flex-1 rounded-full bg-primary"></div>
<div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
</div>
<!-- Content -->
<div class="flex-1 overflow-y-auto pb-24">
<div class="px-6">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-6">Tournament Details</h2>
<form class="flex flex-col gap-6">
<!-- Tournament Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Tournament Name</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="e.g. Summer Open 2023" type="text" value="Regional Qualifiers"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">edit</span>
</div>
</div>
<!-- Date Selection -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Date</label>
<div class="bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
<div class="flex items-center justify-between p-3 border-b border-slate-200 dark:border-slate-700">
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors text-slate-600 dark:text-slate-300" type="button">
<span class="material-symbols-outlined text-lg">chevron_left</span>
</button>
<span class="font-semibold text-sm text-slate-900 dark:text-slate-100">September 2023</span>
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors text-slate-600 dark:text-slate-300" type="button">
<span class="material-symbols-outlined text-lg">chevron_right</span>
</button>
</div>
<div class="p-3">
<div class="grid grid-cols-7 mb-2 text-center">
<span class="text-xs font-medium text-slate-400">S</span>
<span class="text-xs font-medium text-slate-400">M</span>
<span class="text-xs font-medium text-slate-400">T</span>
<span class="text-xs font-medium text-slate-400">W</span>
<span class="text-xs font-medium text-slate-400">T</span>
<span class="text-xs font-medium text-slate-400">F</span>
<span class="text-xs font-medium text-slate-400">S</span>
</div>
<div class="grid grid-cols-7 gap-1 text-center text-sm">
<!-- Empty days -->
<span></span><span></span><span></span>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">1</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">2</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">3</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">4</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full bg-primary text-white shadow-md shadow-primary/30 font-semibold" type="button">5</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">6</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">7</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">8</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">9</button>
<button class="h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" type="button">10</button>
</div>
</div>
</div>
</div>
<!-- K-Factor Selection -->
<div class="space-y-3">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">K-Factor Sensitivity</label>
<button class="text-primary text-xs font-medium hover:underline flex items-center gap-1" type="button">
<span class="material-symbols-outlined text-sm">info</span> What is this?
                            </button>
</div>
<div class="grid grid-cols-3 gap-3">
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="k-factor" type="radio" value="40"/>
<div class="flex flex-col items-center p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all">
<span class="text-xs text-slate-500 dark:text-slate-400 mb-1">Friendly</span>
<span class="text-xl font-bold text-slate-900 dark:text-slate-100">40</span>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none"></div>
</div>
</label>
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="k-factor" type="radio" value="60"/>
<div class="flex flex-col items-center p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all">
<span class="text-xs text-slate-500 dark:text-slate-400 mb-1">Monthly</span>
<span class="text-xl font-bold text-slate-900 dark:text-slate-100">60</span>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none"></div>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="k-factor" type="radio" value="80"/>
<div class="flex flex-col items-center p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all">
<span class="text-xs text-slate-500 dark:text-slate-400 mb-1">Major</span>
<span class="text-xl font-bold text-slate-900 dark:text-slate-100">80</span>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none"></div>
</div>
</label>
</div>
</div>
<!-- Format Selection -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Format</label>
<div class="relative">
<select class="w-full h-12 pl-10 pr-4 appearance-none rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all">
<option>Rank-based Elo</option>
<option>Round Robin</option>
<option>Single Elimination</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">trophy</span>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">expand_more</span>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 px-1">Players are matched based on their current ELO score to ensure fair play.</p>
</div>
</form>
</div>
</div>
<!-- Floating Action Button Area / Sticky Footer -->
<div class="absolute bottom-0 left-0 w-full p-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-semibold rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Next Step
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</body></html>
