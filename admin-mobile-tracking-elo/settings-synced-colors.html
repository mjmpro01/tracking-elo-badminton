<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center p-4 justify-between max-w-2xl mx-auto w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">settings</span>
<h1 class="text-xl font-bold tracking-tight">Settings</h1>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-24 max-w-2xl mx-auto w-full"><!-- General Section -->
<section class="mt-6">
<h2 class="px-4 pb-2 text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">General</h2>
<div class="bg-white dark:bg-slate-800/40 border-y border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between gap-4 px-4 min-h-[3.5rem] transition-colors">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary shrink-0 size-10">
<span class="material-symbols-outlined">dark_mode</span>
</div>
<div class="flex-1">
<p class="text-base font-medium">Dark Mode</p>
<p class="text-xs text-slate-500">Toggle dark theme</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
<!-- Log Out Button -->
<div class="p-6 mt-8">
<button class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-bold border border-red-100 dark:border-red-900/30 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">logout</span>
                Log Out
            </button>
<p class="text-center text-xs text-slate-400 mt-6">Version 2.4.0-stable</p>
</div></main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 safe-area-pb">
<div class="flex max-w-2xl mx-auto px-2 pb-2 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors py-1" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium leading-normal tracking-wide uppercase">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors py-1" href="#">
<span class="material-symbols-outlined">trophy</span>
<span class="text-[10px] font-medium leading-normal tracking-wide uppercase">Tournaments</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors py-1" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-medium leading-normal tracking-wide uppercase">Players</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-1 text-blue-600" href="#">
<span class="material-symbols-outlined fill-1">settings</span>
<span class="text-[10px] font-bold leading-normal tracking-wide uppercase">Settings</span>
</a>
</div>
</nav>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }
        .safe-area-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</body></html>
